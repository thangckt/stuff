name: Update DNF Repo with Multiple RPMs

on:  # Trigger manually or on a schedule (e.g., weekly)
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight

jobs:
  update-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Central Repository
        uses: actions/checkout@v4
        with:
          ref: linux_rpm    # Specify the branch, default is `main`

      - name: Install createrepo
        run: sudo apt-get update && sudo apt-get install -y createrepo-c

      - name: Create rpms directory if it doesn't exist
        run: mkdir -p rpms

      - name: Download RPM from repo1 # only if there is an update (different file size)
        run: |
            RPM_URL="https://github.com/otheruser/repo2/releases/latest/download/app2-${LATEST_TAG}-1.el8.x86_64.rpm"
            RPM_FILE="rpms/app2-latest.rpm"
          curl -L -o rpms/app1-latest.rpm \
          "https://github.com/myuser/repo1/releases/latest/download/app1-$(curl -s https://api.github.com/repos/myuser/repo1/releases/latest | jq -r .tag_name)-1.el8.x86_64.rpm"

      - name: Download RPM from repo2
        run: |
          curl -L -o rpms/app2-latest.rpm \
          "https://github.com/otheruser/repo2/releases/latest/download/app2-$(curl -s https://api.github.com/repos/otheruser/repo2/releases/latest | jq -r .tag_name)-1.el8.x86_64.rpm"

      - name: Update Repository Metadata
        run: createrepo rpms/

      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add rpms/
          git commit -m "Update repo with latest RPMs from multiple sources"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
